<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operus</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0a0a0f;
    color: #e8e6f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 1rem 1.5rem;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .logo {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: white;
  }

  .header-title {
    font-size: 16px;
    font-weight: 600;
    color: #e8e6f0;
    letter-spacing: -0.01em;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #00d68f;
    margin-left: auto;
    box-shadow: 0 0 6px #00d68f88;
  }

  .status-label {
    font-size: 12px;
    color: #00d68f;
  }

  .session-info {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    margin-left: 8px;
  }

  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }

  .message {
    display: flex;
    gap: 10px;
    max-width: 75%;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    margin-top: 2px;
  }

  .message.user .avatar {
    background: rgba(108, 92, 231, 0.3);
    color: #a29bfe;
    border: 0.5px solid rgba(108, 92, 231, 0.4);
  }

  .message.assistant .avatar {
    background: rgba(0, 214, 143, 0.1);
    color: #00d68f;
    border: 0.5px solid rgba(0, 214, 143, 0.2);
  }

  .bubble {
    padding: 0.65rem 0.9rem;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.6;
    max-width: 100%;
    word-break: break-word;
  }

  .message.user .bubble {
    background: rgba(108, 92, 231, 0.18);
    border: 0.5px solid rgba(108, 92, 231, 0.3);
    border-bottom-right-radius: 4px;
    color: #e8e6f0;
  }

  .message.assistant .bubble {
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(255,255,255,0.08);
    border-bottom-left-radius: 4px;
    color: #d4d2e0;
  }

  .intent-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 4px;
    margin-bottom: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .intent-chat { background: rgba(108,92,231,0.15); color: #a29bfe; }
  .intent-needs_web { background: rgba(0,136,255,0.12); color: #74b9ff; }
  .intent-needs_retrieval { background: rgba(253,203,110,0.12); color: #ffeaa7; }
  .intent-direct_answer { background: rgba(0,214,143,0.1); color: #55efc4; }

  .thinking {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 0.65rem 0.9rem;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1); }
  }

  .input-area {
    padding: 1rem 1.5rem;
    border-top: 0.5px solid rgba(255,255,255,0.06);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
    background: #0a0a0f;
  }

  #query-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 0.65rem 1rem;
    color: #e8e6f0;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 42px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  #query-input::placeholder { color: rgba(255,255,255,0.25); }
  #query-input:focus { border-color: rgba(108,92,231,0.5); }

  #send-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: #6c5ce7;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }

  #send-btn:hover { background: #7d6ff0; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { background: rgba(108,92,231,0.3); cursor: not-allowed; }

  #send-btn svg { width: 16px; height: 16px; fill: white; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: rgba(255,255,255,0.2);
    font-size: 13px;
  }

  .empty-logo {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: rgba(108,92,231,0.15);
    border: 0.5px solid rgba(108,92,231,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: #a29bfe;
    margin-bottom: 4px;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 420px;
    margin-top: 8px;
  }

  .suggestion-chip {
    padding: 6px 12px;
    border-radius: 20px;
    border: 0.5px solid rgba(255,255,255,0.1);
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
  }

  .suggestion-chip:hover {
    border-color: rgba(108,92,231,0.4);
    color: #a29bfe;
    background: rgba(108,92,231,0.08);
  }

  .error-bubble {
    background: rgba(231,76,60,0.1);
    border: 0.5px solid rgba(231,76,60,0.25);
    color: #ff7675;
    padding: 0.65rem 0.9rem;
    border-radius: 10px;
    font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">O</div>
  <span class="header-title">Operus</span>
  <div style="display:flex;align-items:center;gap:6px;margin-left:auto;">
    <div class="status-dot"></div>
    <span class="status-label">live</span>
    <span class="session-info" id="session-label"></span>
  </div>
</header>

<div id="chat-window">
  <div class="empty-state" id="empty-state">
    <div class="empty-logo">O</div>
    <span>What can I help you with?</span>
    <div class="suggestions">
      <button class="suggestion-chip" onclick="fillSuggestion('What is the weather in Pokhara today?')">Weather in Pokhara</button>
      <button class="suggestion-chip" onclick="fillSuggestion('Who is the current Prime Minister of Nepal?')">Current PM of Nepal</button>
      <button class="suggestion-chip" onclick="fillSuggestion('Explain how transformers work in AI')">How transformers work</button>
      <button class="suggestion-chip" onclick="fillSuggestion('What is happening in tech news today?')">Tech news today</button>
    </div>
  </div>
</div>

<div class="input-area">
  <textarea id="query-input" placeholder="Ask anything..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
    </svg>
  </button>
</div>

<script>
  const API_URL = 'https://web-production-6e358.up.railway.app';
  const sessionId = 'session_' + Math.random().toString(36).slice(2, 9);
  document.getElementById('session-label').textContent = '#' + sessionId.slice(-6);

  const chatWindow = document.getElementById('chat-window');
  const input = document.getElementById('query-input');
  const sendBtn = document.getElementById('send-btn');
  let isLoading = false;

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  function fillSuggestion(text) {
    input.value = text;
    input.focus();
    input.dispatchEvent(new Event('input'));
  }

  function removeEmptyState() {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();
  }

  function appendMessage(role, text, intent) {
    removeEmptyState();
    const msg = document.createElement('div');
    msg.className = 'message ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : 'O';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'assistant' && intent) {
      const tag = document.createElement('div');
      tag.className = 'intent-tag intent-' + intent;
      tag.textContent = intent.replace('_', ' ');
      bubble.appendChild(tag);
    }

    const textNode = document.createElement('div');
    textNode.textContent = text;
    bubble.appendChild(textNode);

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatWindow.appendChild(msg);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return msg;
  }

  function appendThinking() {
    removeEmptyState();
    const msg = document.createElement('div');
    msg.className = 'message assistant';
    msg.id = 'thinking';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'O';

    const bubble = document.createElement('div');
    bubble.className = 'bubble thinking';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatWindow.appendChild(msg);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeThinking() {
    const t = document.getElementById('thinking');
    if (t) t.remove();
  }

  async function sendMessage() {
    const query = input.value.trim();
    if (!query || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    appendMessage('user', query);
    appendThinking();

    try {
      const res = await fetch(API_URL + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, session_id: sessionId })
      });

      if (!res.ok) throw new Error('Server error ' + res.status);

      const data = await res.json();
      removeThinking();
      appendMessage('assistant', data.response, data.intent);
    } catch (err) {
      removeThinking();
      removeEmptyState();
      const errDiv = document.createElement('div');
      errDiv.className = 'error-bubble';
      errDiv.textContent = 'Could not reach Operus. Make sure the backend is running.';
      chatWindow.appendChild(errDiv);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
